name = "lounge-guru-mcp"
main = "mcp/worker.js"
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
routes = [
  "loungeguru.desk.travel/mcp*",
  "loungeguru.desk.travel/sse*",
  "loungeguru.desk.travel/messages*",
  "loungeguru.desk.travel/healthz",
  "loungeguru.desk.travel/admin/source-intake*",
]

[[durable_objects.bindings]]
name = "MCP_RATE_LIMITER"
class_name = "McpRateLimiter"

[[durable_objects.bindings]]
name = "LOUNGE_GURU_MCP"
class_name = "CatalogMcpAgent"

[[d1_databases]]
binding = "LOUNGE_GURU_DB"
database_name = "lounge-guru-catalog"
database_id = "7ce3bfa1-3a17-4554-a526-c3703ca3b902"
migrations_dir = "migrations"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["McpRateLimiter"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CatalogMcpAgent"]
