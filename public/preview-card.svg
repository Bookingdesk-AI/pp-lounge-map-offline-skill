<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Priority Pass - Global Lounge Atlas</title>
  <desc id="desc">Interactive map of 1,754 Priority Pass lounges worldwide with country, city, and facility filters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03101f"/>
      <stop offset="55%" stop-color="#0a2439"/>
      <stop offset="100%" stop-color="#163a59"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1d296"/>
      <stop offset="100%" stop-color="#be9450"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1050" cy="120" r="200" fill="#d7b570" fill-opacity="0.10"/>
  <circle cx="120" cy="540" r="220" fill="#5ea7d9" fill-opacity="0.10"/>

  <rect x="70" y="80" width="1060" height="470" rx="24" fill="#071b2d" fill-opacity="0.65" stroke="#ffffff" stroke-opacity="0.18"/>

  <text x="110" y="165" fill="#a5b4c8" font-family="Manrope, Segoe UI, sans-serif" font-size="28" letter-spacing="3">PRIORITY PASS</text>
  <text x="110" y="250" fill="url(#gold)" font-family="Georgia, Times New Roman, serif" font-size="72" font-weight="700">Global Lounge Atlas</text>

  <text x="110" y="320" fill="#f4f8ff" font-family="Manrope, Segoe UI, sans-serif" font-size="34">1,754 lounges across 140 countries</text>
  <text x="110" y="365" fill="#c9d6e6" font-family="Manrope, Segoe UI, sans-serif" font-size="26">Interactive map with search, filters, and detail panels</text>

  <g transform="translate(110,430)">
    <rect width="178" height="54" rx="27" fill="#d7b570" fill-opacity="0.20" stroke="#d7b570"/>
    <text x="38" y="35" fill="#f6ddb0" font-family="Manrope, Segoe UI, sans-serif" font-size="26">LOUNGE</text>
  </g>

  <g transform="translate(308,430)">
    <rect width="128" height="54" rx="27" fill="#7cc1b0" fill-opacity="0.20" stroke="#7cc1b0"/>
    <text x="34" y="35" fill="#bdeadd" font-family="Manrope, Segoe UI, sans-serif" font-size="26">EAT</text>
  </g>

  <g transform="translate(456,430)">
    <rect width="168" height="54" rx="27" fill="#86a8e4" fill-opacity="0.20" stroke="#86a8e4"/>
    <text x="34" y="35" fill="#d3e0ff" font-family="Manrope, Segoe UI, sans-serif" font-size="26">REFRESH</text>
  </g>
</svg>
